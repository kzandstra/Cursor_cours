<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriorityFlow | Premium To-Do List</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="glass-background"></div>
    <main class="app-container">
        <header class="app-header">
            <h1>PriorityFlow</h1>
            <p class="subtitle">Stay organized in style</p>
        </header>

        <section class="todo-input-section">
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off">
                <button type="submit" class="btn-add" aria-label="Add task">
                    <i data-lucide="plus"></i>
                </button>
            </form>
        </section>

        <section class="todo-list-section">
            <ul id="todo-list">
                <!-- Tasks will be rendered here -->
            </ul>
        </section>

        <footer class="app-footer">
            <div id="todo-stats">
                <span id="items-left">0 items left</span>
            </div>
        </footer>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Initialize lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
